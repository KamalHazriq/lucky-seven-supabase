    <linearGradient id="textAccent" x1="620" y1="120" x2="1020" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FCA5A5"/>
    </linearGradient>
    <filter id="blur" x="-120" y="-120" width="1440" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="384" rx="22" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g filter="url(#blur)" opacity="0.9">
