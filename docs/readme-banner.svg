    <rect x="46" y="12" width="150" height="220" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="3" transform="rotate(-4 46 12)"/>
    <rect x="84" y="26" width="150" height="220" rx="18" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="3" transform="rotate(8 84 26)"/>

    <rect x="62" y="46" width="118" height="172" rx="18" fill="url(#accent)"/>
    <text x="121" y="118" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" fill="#FFF7ED">7</text>
    <text x="121" y="164" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#FFE4E6">LUCKY</text>
    <text x="121" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#FFE4E6">SEVEN</text>
  </g>

